<!DOCTYPE html>
<html>
<head>
    <title>PDF Extractor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>
    <h2>Extracting PDF... Please keep this page open.</h2>
    <div id="status"></div>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        async function extract() {
            try {
                document.getElementById('status').innerText = "Loading PDF...";
                const loadingTask = pdfjsLib.getDocument('/cards.pdf');
                const pdf = await loadingTask.promise;
                const totalPages = pdf.numPages;
                document.getElementById('status').innerText = `PDF loaded. Total pages: ${totalPages}. Starting extraction...`;

                for (let i = 1; i <= totalPages; i++) {
                    const page = await pdf.getPage(i);
                    // Standard scale, can increase for better quality
                    const scale = 2.0; 
                    const viewport = page.getViewport({ scale: scale });

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport
                    };
                    await page.render(renderContext).promise;

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
                    
                    document.getElementById('status').innerText = `Sending page ${i} / ${totalPages}...`;
                    
                    await fetch('/upload', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ page: i, dataUrl })
                    });
                }
                
                document.getElementById('status').innerText = "All pages extracted! Done.";
                await fetch('/done', { method: 'POST' });
            } catch (err) {
                document.getElementById('status').innerText = "Error: " + err.message;
                console.error(err);
            }
        }
        
        extract();
    </script>
</body>
</html>
