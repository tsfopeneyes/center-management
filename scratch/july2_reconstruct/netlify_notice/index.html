<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주소 변경 안내 | School Church Impact</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; color: #1e293b; text-align: center; }
        .card { background: white; padding: 40px; border-radius: 28px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01); max-width: 420px; width: 90%; border: 1px solid #f1f5f9; }
        h1 { margin: 0 0 16px; font-size: 24px; font-weight: 800; color: #0f172a; letter-spacing: -0.5px; line-height: 1.3; }
        p { margin: 0 0 28px; font-size: 15px; line-height: 1.6; color: #64748b; font-weight: 500; }
        .timer { font-weight: 800; color: #4f46e5; font-size: 20px; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background-color: #4f46e5; color: white; padding: 14px 28px; border-radius: 999px; text-decoration: none; font-weight: 700; font-size: 16px; transition: all 0.2s; width: 100%; box-sizing: border-box; }
        .btn:hover { background-color: #4338ca; transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2); }
        .btn:active { transform: translateY(0); }
        .icon { font-size: 56px; margin-bottom: 24px; animation: bounce 2s infinite ease-in-out; display: inline-block; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .domain { display: inline-block; background: #f1f5f9; color: #334155; padding: 4px 12px; border-radius: 8px; font-size: 14px; font-weight: 600; margin-top: 8px; letter-spacing: -0.3px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🚀</div>
        <h1>웹사이트 접속 주소가<br>새롭게 바뀌었습니다!</h1>
        <p>
            더 빠르고 쾌적한 서비스를 제공하기 위해<br>스쿨처치임팩트 전용 도메인으로 이전했습니다.
            <br>
            <span class="domain">app.schoolchurchimpact.org</span>
        </p>
        <p style="margin-bottom: 32px;"><span class="timer" id="countdown">3</span>초 뒤 새로운 주소로<br>자동 이동합니다.</p>
        <a href="https://app.schoolchurchimpact.org" class="btn" id="link">
            지금 바로 이동하기
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
        </a>
    </div>

    <script>
        // 현재 경로유지 (예: /login?return_to=/board -> 그대로 새 주소로 넘김)
        var currentPath = window.location.pathname + window.location.search + window.location.hash;
        var targetUrl = "https://app.schoolchurchimpact.org" + (currentPath === '/' ? '' : currentPath);
        
        document.getElementById("link").href = targetUrl;
        
        var count = 3;
        var countdownEl = document.getElementById("countdown");
        
        var interval = setInterval(function() {
            count--;
            countdownEl.textContent = count;
            if (count <= 0) {
                clearInterval(interval);
                window.location.replace(targetUrl);
            }
        }, 1000);
    </script>
</body>
</html>
